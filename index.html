<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhoneStore</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── Body & bg shift ── */
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;overflow-x:hidden;
  background:#f4f6fb;
  transition:background 1s ease;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 55% at 50% 0%,var(--bg-top,rgba(120,180,255,.22)) 0%,transparent 70%);
  pointer-events:none;z-index:0;
  transition:--bg-top 1s; /* won't animate but fallback is fine */
}
/* We animate the pseudo via a real overlay div */
#bgBloom{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  transition:background 1.1s ease,opacity 1.1s ease;
  opacity:1;
}

/* ── Particle canvas ── */
#cvs{position:fixed;inset:0;pointer-events:none;z-index:1}

/* ── Header ── */
header{
  background:rgba(255,255,255,.82);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding:15px 40px;display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;z-index:200;
  border-bottom:1px solid rgba(0,0,0,.07);
}
.logo{font-size:21px;font-weight:800;letter-spacing:-.5px;color:#111;display:flex;align-items:center;gap:10px}
.logo-mark{width:33px;height:33px;background:#111;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px}
.hicons{display:flex;gap:10px}
.hbtn{
  background:rgba(0,0,0,.05);border:none;width:40px;height:40px;
  border-radius:10px;font-size:18px;cursor:pointer;
  transition:background .2s,transform .2s;
  display:flex;align-items:center;justify-content:center;
}
.hbtn:hover{background:rgba(0,0,0,.1);transform:translateY(-2px)}

/* ── Page ── */
.page{max-width:1400px;margin:0 auto;padding:56px 24px 80px;position:relative;z-index:2}

.sec-label{
  text-align:center;font-size:11px;font-weight:700;
  letter-spacing:3.5px;text-transform:uppercase;
  color:rgba(0,0,0,.32);margin-bottom:10px;
}

/* Gradient title that shifts per phone */
.sec-title{
  text-align:center;font-size:46px;font-weight:900;
  letter-spacing:-2px;line-height:1.05;margin-bottom:0;
  background:var(--title-grad,linear-gradient(135deg,#4f8ef7,#6eb5ff));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  transition:background .8s;
}

.phone-label{
  text-align:center;font-size:19px;font-weight:600;color:#111;
  margin:26px 0 0;min-height:26px;
  transition:opacity .22s,transform .22s;
}
.phone-label.out{opacity:0;transform:translateY(7px)}



/* ── Carousel ── */
.carousel-wrap{
  position:relative;display:flex;justify-content:center;align-items:center;
  height:590px;margin-top:36px;perspective:1500px;
}
.carousel-track{position:relative;width:100%;height:100%}

/* ── Scene (flip container) ── */
.scene{
  position:absolute;left:50%;top:50%;
  width:318px;height:502px;
  margin-left:-159px;margin-top:-251px;
  transform-style:preserve-3d;
  transition:transform .68s cubic-bezier(.4,0,.2,1),opacity .68s cubic-bezier(.4,0,.2,1);
  animation:sceneIn .75s cubic-bezier(.34,1.4,.64,1) both;
}
@keyframes sceneIn{from{opacity:0;transform:translateX(0) scale(.7);}}

.scene.pos-active{transform:translateX(0) scale(1.08);opacity:1;z-index:4}
.scene.pos-prev  {transform:translateX(-430px) scale(.82) rotateY(10deg);opacity:.5;z-index:3}
.scene.pos-next  {transform:translateX(430px)  scale(.82) rotateY(-10deg);opacity:.5;z-index:3}
.scene.pos-far-l {transform:translateX(-880px) scale(.55);opacity:0;z-index:1;pointer-events:none}
.scene.pos-far-r {transform:translateX(880px)  scale(.55);opacity:0;z-index:1;pointer-events:none}

/* ── Flip inner ── */
.flip-inner{
  width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .65s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.scene.flipped .flip-inner{transform:rotateY(180deg)}

/* ── Card faces ── */
.face{
  position:absolute;inset:0;
  border-radius:28px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  overflow:hidden;
}

/* Front face */
.face-front{
  background:#fff;
  border:2px solid transparent;
  box-shadow:0 8px 28px rgba(0,0,0,.07);
  display:flex;align-items:center;justify-content:center;
  padding:26px;cursor:pointer;
  transition:border-color .55s,box-shadow .55s,transform .18s;
}
.scene.pos-active .face-front{
  border-color:var(--pc,#aaa);
  box-shadow:
    0 22px 60px rgba(0,0,0,.11),
    0 0 0 1px var(--pc,#aaa),
    0 0 30px 6px color-mix(in srgb,var(--pc,#aaa) 28%,transparent);
}



/* shimmer on hover */
.face-front::before{
  content:'';position:absolute;top:-60%;left:-80%;width:55%;height:220%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.48),transparent);
  transform:skewX(-15deg);pointer-events:none;opacity:0;
}
.scene.pos-active .face-front:hover::before{animation:shimmer .55s ease forwards}
@keyframes shimmer{0%{left:-80%;opacity:1}100%{left:140%;opacity:0}}

.color-dot{
  position:absolute;top:15px;right:15px;width:13px;height:13px;border-radius:50%;
  border:2px solid rgba(0,0,0,.1);
  transition:transform .35s cubic-bezier(.34,1.4,.64,1);
}
.scene.pos-active .color-dot{transform:scale(1.5)}

.phone-img{
  width:100%;height:100%;object-fit:contain;pointer-events:none;
  filter:drop-shadow(0 16px 28px rgba(0,0,0,.18));
  transition:transform .4s cubic-bezier(.34,1.4,.64,1);
}


/* Back face */
.face-back{
  background:#111;
  transform:rotateY(180deg);
  display:flex;flex-direction:column;
  padding:32px 28px;cursor:pointer;
  border:2px solid var(--pc,#aaa);
  box-shadow:0 0 30px 6px color-mix(in srgb,var(--pc,#aaa) 30%,transparent);
}
.back-logo{font-size:15px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:auto}
.back-name{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:6px}
.back-sub{font-size:14px;color:rgba(255,255,255,.45);margin-bottom:28px}
.spec-list{display:flex;flex-direction:column;gap:12px;margin-bottom:auto}
.spec-row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:11px}
.spec-key{font-size:12px;font-weight:600;color:rgba(255,255,255,.38);letter-spacing:.5px;text-transform:uppercase}
.spec-val{font-size:14px;font-weight:700;color:#fff}
.back-cta{
  margin-top:20px;background:var(--pc,#4f8ef7);color:#fff;
  border:none;border-radius:12px;padding:14px;
  font-size:22px;font-weight:700;cursor:pointer;
  transition:filter .2s,transform .2s;
  box-shadow:0 6px 18px color-mix(in srgb,var(--pc,#4f8ef7) 45%,transparent);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.back-cta:hover{filter:brightness(1.12);transform:translateY(-2px)}

/* ── Nav buttons ── */
.nav-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.9);backdrop-filter:blur(10px);
  border:1px solid rgba(0,0,0,.1);width:50px;height:50px;
  border-radius:50%;font-size:18px;cursor:pointer;z-index:10;
  transition:background .2s,color .2s,transform .2s,box-shadow .2s;
  color:#111;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}
.nav-btn:hover{background:#111;color:#fff;transform:translateY(-50%) scale(1.1);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.nav-btn.left{left:60px}.nav-btn.right{right:60px}

/* ── Dots ── */
.dots{display:flex;justify-content:center;gap:8px;margin-top:30px}
.dot{
  width:8px;height:8px;border-radius:4px;
  background:rgba(0,0,0,.14);cursor:pointer;
  transition:width .35s cubic-bezier(.4,0,.2,1),background .35s;
}
.dot.on{width:32px}



/* ── Modal ── */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.42);backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);z-index:300;
  justify-content:center;align-items:center;
}
.modal-bg.open{display:flex}
.modal{
  background:#fff;border-radius:32px;
  padding:44px 38px 38px;max-width:510px;width:92%;
  text-align:center;position:relative;
  border:2px solid var(--mc,#ddd);
  box-shadow:
    0 32px 80px rgba(0,0,0,.17),
    0 0 0 1px var(--mc,#ddd),
    0 0 36px 8px color-mix(in srgb,var(--mc,#ddd) 28%,transparent);
  animation:modalIn .42s cubic-bezier(.34,1.4,.64,1) both;
  transform-origin:center bottom;
}
@keyframes modalIn{from{opacity:0;transform:scale(.88) translateY(24px)}}
.modal-close{
  position:absolute;top:15px;right:15px;
  width:34px;height:34px;border-radius:50%;
  background:rgba(0,0,0,.06);border:none;font-size:20px;
  cursor:pointer;color:#333;display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .3s;
}
.modal-close:hover{background:rgba(0,0,0,.12);transform:rotate(90deg)}
.modal-img{
  width:230px;height:230px;object-fit:contain;
  filter:drop-shadow(0 16px 24px rgba(0,0,0,.2));
  transition:transform .4s cubic-bezier(.34,1.4,.64,1);margin-bottom:14px;
}
.modal-img:hover{transform:scale(1.07) rotate(-3deg)}
.modal-name{font-size:22px;font-weight:800;color:#111;margin-bottom:3px;letter-spacing:-.3px}
.modal-hint{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(0,0,0,.3);margin-bottom:20px}
.chips{display:flex;gap:9px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.chip{
  padding:9px 17px;border:1.5px solid rgba(0,0,0,.13);border-radius:999px;
  background:#fff;font-size:13px;font-weight:700;color:#444;cursor:pointer;
  transition:border-color .2s,background .2s,color .2s,transform .2s,box-shadow .2s;
}
.chip:hover{border-color:#555}
.chip.on{
  background:var(--mc,#111);color:#fff;border-color:var(--mc,#111);
  transform:scale(1.06);
  box-shadow:0 4px 14px color-mix(in srgb,var(--mc,#111) 40%,transparent);
}
.learn-btn{
  width:100%;background:var(--mc,#111);color:#fff;border:none;
  padding:17px;font-size:17px;font-weight:700;border-radius:14px;cursor:pointer;
  letter-spacing:.3px;
  box-shadow:0 6px 20px color-mix(in srgb,var(--mc,#111) 40%,transparent);
  transition:transform .2s,filter .2s;
}
.learn-btn:hover{transform:translateY(-2px);filter:brightness(1.1)}
.learn-btn:active{transform:scale(.98)}

/* ── Success screen ── */
.success-screen{
  display:none;position:fixed;inset:0;
  background:rgba(255,255,255,.94);backdrop-filter:blur(20px);
  z-index:400;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.success-screen.open{display:flex;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}}
.success-icon{
  width:110px;height:110px;border-radius:50%;background:#22c55e;
  display:flex;align-items:center;justify-content:center;
  font-size:56px;color:#fff;
  box-shadow:0 16px 50px rgba(34,197,94,.4);
  animation:iconPop .55s cubic-bezier(.34,1.56,.64,1) .15s both;
}
@keyframes iconPop{from{transform:scale(0) rotate(-20deg);opacity:0}}
.success-title{
  font-size:28px;font-weight:800;color:#111;
  animation:riseIn .5s cubic-bezier(.34,1.4,.64,1) .3s both;
}
.success-info{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  animation:riseIn .5s cubic-bezier(.34,1.4,.64,1) .42s both;
}
.success-info-row{
  font-size:15px;color:rgba(0,0,0,.45);font-weight:500;
}
.success-info-row strong{color:#111;font-weight:700;}
@keyframes riseIn{from{opacity:0;transform:translateY(12px)}}
.confetti{position:fixed;width:9px;height:9px;border-radius:2px;pointer-events:none;z-index:450;animation:cfall linear forwards}
@keyframes cfall{
  0%  {transform:translateY(-20px) rotate(0deg)   scaleX(1);  opacity:1}
  50% {transform:translateY(50vh)  rotate(360deg) scaleX(.4); opacity:1}
  100%{transform:translateY(110vh) rotate(720deg) scaleX(1);  opacity:0}
}

@media(max-width:720px){
  .scene{width:260px;height:420px;margin-left:-130px;margin-top:-210px}
  .scene.pos-prev{transform:translateX(-305px) scale(.8) rotateY(8deg)}
  .scene.pos-next{transform:translateX(305px) scale(.8) rotateY(-8deg)}
  .nav-btn.left{left:6px}.nav-btn.right{right:6px}
  .sec-title{font-size:30px}
}
</style>
</head>
<body>

<div id="bgBloom"></div>
<canvas id="cvs"></canvas>

<header>
  <div class="logo"><div class="logo-mark">📱</div>PhoneStore</div>
  <div class="hicons">
    <button class="hbtn">👤</button>
    <button class="hbtn">🛒</button>
  </div>
</header>

<div class="page">
  <div class="sec-label">New Collection · 2025</div>
  <div class="sec-title" id="secTitle">Find your match</div>
  <div class="phone-label" id="lbl"></div>

  <div class="carousel-wrap">
    <button class="nav-btn left"  onclick="move(-1)">❮</button>
    <div class="carousel-track" id="track"></div>
    <button class="nav-btn right" onclick="move(1)">❯</button>
  </div>

  <div class="dots" id="dots"></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg" onclick="bgClose(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <img class="modal-img" id="mImg" src="" alt="">
    <div class="modal-name" id="mName"></div>
    <div class="modal-hint">Select storage</div>
    <div class="chips" id="chips"></div>
    <button class="learn-btn" id="learnBtn" onclick="learnMore()">Learn More</button>
  </div>
</div>

<!-- Success screen -->
<div class="success-screen" id="succ">
  <div class="success-icon">✓</div>
  <div class="success-title">Great choice!</div>
  <div class="success-info">
    <div class="success-info-row" id="sName"></div>
    <div class="success-info-row" id="sColor"></div>
    <div class="success-info-row" id="sGb"></div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────────
   DATA  — order: light blue, orange, silver, pink, black
───────────────────────────────────────────── */
const phones = [
  {
    name:'iPhone 15', sub:'Blue Titanium', img:'images/15_blue.webp',
    color:'#4f8ef7', bg:'rgba(100,160,255,.18)',
    grad:'linear-gradient(135deg,#4f8ef7,#82b4ff)',
    specs:[['Display','6.1" OLED'],['Chip','A16 Bionic'],['Camera','48 MP'],['Battery','3274 mAh'],['5G','Yes']],
    ticker:['48MP Camera','4K ProRes','A16 Bionic','USB-C','Ceramic Shield'],
  },
  {
    name:'iPhone 17', sub:'Sunset Orange', img:'images/17_orange.png',
    color:'#f47920', bg:'rgba(244,121,32,.15)',
    grad:'linear-gradient(135deg,#f47920,#ffa85a)',
    specs:[['Display','6.3" OLED'],['Chip','A18 Pro'],['Camera','50 MP'],['Battery','3850 mAh'],['5G','Yes']],
    ticker:['50MP ProCamera','8K Video','A18 Pro Chip','Action Button','USB-C 3.2'],
  },
  {
    name:'iPhone 17', sub:'Pearl White', img:'images/17_white.png',
    color:'#8888a8', bg:'rgba(140,140,180,.14)',
    grad:'linear-gradient(135deg,#8888a8,#b0b0cc)',
    specs:[['Display','6.3" OLED'],['Chip','A18 Pro'],['Camera','50 MP'],['Battery','3850 mAh'],['5G','Yes']],
    ticker:['50MP ProCamera','8K Video','A18 Pro Chip','Action Button','USB-C 3.2'],
  },
  {
    name:'iPhone 16', sub:'Blossom Pink', img:'images/16_pink.png',
    color:'#e8589a', bg:'rgba(232,88,154,.15)',
    grad:'linear-gradient(135deg,#e8589a,#ff85bd)',
    specs:[['Display','6.1" OLED'],['Chip','A17 Pro'],['Camera','48 MP'],['Battery','3561 mAh'],['5G','Yes']],
    ticker:['48MP Camera','4K Dolby','A17 Pro Chip','Emergency SOS','USB-C'],
  },
  {
    name:'iPhone 16', sub:'Midnight Black', img:'images/16_black.png',
    color:'#444460', bg:'rgba(60,60,90,.18)',
    grad:'linear-gradient(135deg,#444460,#666688)',
    specs:[['Display','6.1" OLED'],['Chip','A17 Pro'],['Camera','48 MP'],['Battery','3561 mAh'],['5G','Yes']],
    ticker:['48MP Camera','4K Dolby','A17 Pro Chip','Emergency SOS','USB-C'],
  },
];

const storage=[{l:'64 GB'},{l:'128 GB'},{l:'256 GB'},{l:'512 GB'}];

let cur=0, busy=false, timer, selStor=1, openPhone=0;

/* ─────────────────────────────────────────────
   PARTICLE SYSTEM
───────────────────────────────────────────── */
const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
let W,H,particles=[];
function resizeCvs(){W=cvs.width=innerWidth;H=cvs.height=innerHeight}
window.addEventListener('resize',resizeCvs);
resizeCvs();

function hexToRgb(h){
  const n=parseInt(h.replace('#',''),16);
  return[(n>>16)&255,(n>>8)&255,n&255];
}

function spawnParticles(color){
  particles=[];
  const [r,g,b]=hexToRgb(color);
  for(let i=0;i<55;i++){
    particles.push({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*.4, vy:(Math.random()-.5)*.4,
      r:Math.random()*3+1,
      alpha:Math.random()*.45+.1,
      cr:r,cg:g,cb:b,
      pulse:Math.random()*Math.PI*2,
      pSpeed:Math.random()*.015+.008,
    });
  }
}

function animParticles(){
  requestAnimationFrame(animParticles);
  ctx.clearRect(0,0,W,H);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    p.pulse+=p.pSpeed;
    if(p.x<-20)p.x=W+20; if(p.x>W+20)p.x=-20;
    if(p.y<-20)p.y=H+20; if(p.y>H+20)p.y=-20;
    const a=p.alpha*(0.7+0.3*Math.sin(p.pulse));
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.cr},${p.cg},${p.cb},${a})`;
    ctx.fill();
  });
}
animParticles();
spawnParticles(phones[0].color);

/* ─────────────────────────────────────────────
   BUILD UI
───────────────────────────────────────────── */
function init(){
  const track=document.getElementById('track');
  track.innerHTML='';
  phones.forEach((p,i)=>{
    const sc=document.createElement('div');
    sc.className='scene';
    sc.style.animationDelay=(i*80)+'ms';
    sc.dataset.i=i;
    sc.style.setProperty('--pc',p.color);
    sc.innerHTML=`
      <div class="flip-inner" id="fi${i}">
        <div class="face face-front" onclick="faceClick(${i})">
          <div class="color-dot" style="background:${p.color}"></div>
          <img class="phone-img" src="${p.img}" alt="${p.name}">

        </div>
        <div class="face face-back">
          <div class="back-logo">PhoneStore</div>
          <div class="back-name">${p.name}</div>
          <div class="back-sub">${p.sub}</div>
          <div class="spec-list">
            ${p.specs.map(s=>`
              <div class="spec-row">
                <span class="spec-key">${s[0]}</span>
                <span class="spec-val">${s[1]}</span>
              </div>`).join('')}
          </div>
          <button class="back-cta" style="--pc:${p.color}" onclick="openModal(${i})">+</button>
        </div>
      </div>`;
    track.appendChild(sc);
  });
  buildDots();
  render(true);
}

function buildDots(){
  document.getElementById('dots').innerHTML=
    phones.map((_,i)=>`<div class="dot${i===0?' on':''}" onclick="goTo(${i})"></div>`).join('');
}

/* ─────────────────────────────────────────────
   RENDER / NAVIGATION
───────────────────────────────────────────── */
function render(first){
  document.querySelectorAll('.scene').forEach(sc=>{
    const i=+sc.dataset.i;
    sc.className='scene '+posClass(i);
    // un-flip non-active
    if(posClass(i)!=='pos-active') sc.classList.remove('flipped');
  });

  const p=phones[cur];

  // bg bloom
  document.getElementById('bgBloom').style.background=
    `radial-gradient(ellipse 80% 50% at 50% -10%, ${p.bg} 0%, transparent 65%)`;

  // title gradient
  document.getElementById('secTitle').style.backgroundImage=p.grad;

  // label crossfade
  const lbl=document.getElementById('lbl');
  lbl.classList.add('out');
  setTimeout(()=>{ lbl.textContent=p.name+' — '+p.sub; lbl.classList.remove('out'); },190);

  // dots
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('on',i===cur);
    d.style.background=i===cur?p.color:'';
  });
  // particles transition
  if(!first) spawnParticles(p.color);
}

function posClass(i){
  const n=phones.length;
  let d=((i-cur)%n+n)%n;
  if(d>n/2)d-=n;
  if(d<=-2)return'pos-far-l';
  if(d===-1)return'pos-prev';
  if(d===0)return'pos-active';
  if(d===1)return'pos-next';
  return'pos-far-r';
}

function move(dir){
  if(busy)return;
  busy=true;
  cur=((cur+dir)%phones.length+phones.length)%phones.length;
  render();
  setTimeout(()=>busy=false,680);
  resetTimer();
}
function goTo(i){if(busy||i===cur)return;busy=true;cur=i;render();setTimeout(()=>busy=false,680);resetTimer();}
function resetTimer(){clearInterval(timer);timer=setInterval(()=>move(1),3600)}

/* ─────────────────────────────────────────────
   FLIP
───────────────────────────────────────────── */
function faceClick(i){
  const sc=document.querySelector(`.scene[data-i="${i}"]`);
  if(!sc.classList.contains('pos-active')){goTo(i);return;}
  sc.classList.toggle('flipped');
}

/* ─────────────────────────────────────────────
   MODAL
───────────────────────────────────────────── */
function openModal(i){
  clearInterval(timer);
  document.querySelectorAll('.scene').forEach(sc=>sc.classList.remove('flipped'));
  openPhone=i;
  const p=phones[i];
  document.getElementById('mImg').src=p.img;
  document.getElementById('mName').textContent=p.name+' '+p.sub;
  document.getElementById('modal').style.setProperty('--mc',p.color);
  document.getElementById('learnBtn').style.setProperty('--mc',p.color);
  selStor=1;
  buildChips(p.color);
  document.getElementById('modalBg').classList.add('open');
}

function buildChips(color){
  document.getElementById('chips').innerHTML=storage.map((s,i)=>
    `<button class="chip${i===selStor?' on':''}" style="--mc:${color}" onclick="pickChip(${i},this)">${s.l}</button>`
  ).join('');
}
function pickChip(i,el){
  selStor=i;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}
function closeModal(){document.getElementById('modalBg').classList.remove('open');resetTimer()}
function bgClose(e){if(e.target.id==='modalBg')closeModal()}

function learnMore(){
  const p=phones[openPhone];
  closeModal();
  document.getElementById('sName').innerHTML=`<strong>${p.name}</strong>`;
  document.getElementById('sColor').innerHTML=`Color: <strong>${p.sub}</strong>`;
  document.getElementById('sGb').innerHTML=`Storage: <strong>${storage[selStor].l}</strong>`;
  document.getElementById('succ').classList.add('open');
  burst(p.color);
  setTimeout(()=>document.getElementById('succ').classList.remove('open'),3400);
}

function burst(base){
  const palette=[base,lighten(base),'#ffffff','#f0f0f8'];
  for(let i=0;i<160;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti';
      el.style.cssText=[
        `left:${Math.random()*100}%`,`top:-12px`,
        `background:${palette[Math.floor(Math.random()*palette.length)]}`,
        `animation-duration:${2.2+Math.random()*1.6}s`,
        `animation-delay:${Math.random()*.38}s`,
        `border-radius:${Math.random()>.5?'50%':'2px'}`,
      ].join(';');
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),4400);
    },i*14);
  }
}
function lighten(hex){
  const n=parseInt(hex.replace('#',''),16);
  const r=Math.min(255,(n>>16)+90),g=Math.min(255,((n>>8)&255)+90),b=Math.min(255,(n&255)+90);
  return`rgb(${r},${g},${b})`;
}

/* ─────────────────────────────────────────────
   KEYBOARD + TOUCH
───────────────────────────────────────────── */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')move(-1);
  if(e.key==='ArrowRight')move(1);
  if(e.key==='Escape'){closeModal();document.querySelectorAll('.scene').forEach(sc=>sc.classList.remove('flipped'))}
});
let tx=0;
document.getElementById('track').addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX},{passive:true});
document.getElementById('track').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].screenX-tx;
  if(Math.abs(dx)>44)move(dx<0?1:-1);
});

/* ─────────────────────────────────────────────
   BOOT
───────────────────────────────────────────── */
init();
resetTimer();
</script>
</body>
</html>
